# Family assignment rules (pattern matching su categoria Excel)
family_detection:
  - pattern: ["monetar", "liquidity", "money market"]
    family: "monetario_liquidita"

  - pattern: ["settorial", "thematic", "tecnolog", "healthcare", "salute", "energia", "infrastruttur", "real estate", "immobil", "biotech", "pharma", "fintech", "consumi", "lusso", "consumer", "acqua", "water", "agri", "food", "nutrizi", "cyber", "security", "biotecnolog", "farmac"]
    family: "settoriali_growth"

  - pattern: ["alternativ", "bilanc", "multi-asset", "absolute return"]
    family: "bond_corp_hy_em"

  - pattern: ["emerging", "cina", "india", "asia pacific"]
    family: "mercati_emergenti"

  - pattern: ["materie prime", "oro", "gold", "commodity", "metalli", "petrolio"]
    family: "oro_metalli_preziosi"

  - pattern: ["high yield", "high-yield", "corporate", "credit"]
    family: "bond_corp_hy_em"

  - pattern: ["obblig", "bond", "fixed"]
    family: "bond_governativi"

  - pattern: ["crypto", "bitcoin", "ethereum", "blockchain", "digital"]
    family: "crypto_digital_assets"

# Default fallback
default_family: "equity_sviluppati"
